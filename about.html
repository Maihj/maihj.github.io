<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="starfield"></div>
    <div class="stars" id="stars"></div>
    <div class="binary-rain" id="binary-rain"></div>
    
    <nav class="navbar">
        <a href="index.html" class="logo">&lt;/Start&gt;</a>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="index.html#articles">文章</a></li>
            <li><a href="about.html">关于</a></li>
            <li><a href="https://github.com/maihj" target="_blank">GitHub</a></li>
        </ul>
    </nav>
    
    <main class="main-content">
        <div class="about-page">
            <div class="mystery-container">
                <span class="mystery-mark">?</span>
                <div class="mystery-glow"></div>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <p>&copy; Maihj. All rights reserved.</p>
    </footer>
    
    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(star);
            }
        }
        function createBinaryRain() {
            const rainContainer = document.getElementById('binary-rain');
            for (let i = 0; i < 30; i++) {
                const column = document.createElement('div');
                column.className = 'binary-column';
                column.style.left = (i / 30 * 100) + '%';
                column.style.setProperty('--duration', (Math.random() * 10 + 15) + 's');
                column.style.animationDelay = Math.random() * 15 + 's';
                let binaryString = '';
                for (let j = 0; j < Math.floor(Math.random() * 30 + 20); j++) {
                    binaryString += Math.random() > 0.5 ? '1' : '0';
                }
                column.textContent = binaryString;
                rainContainer.appendChild(column);
            }
        }
        document.addEventListener('DOMContentLoaded', function() { createStars(); createBinaryRain(); });
    </script>
</body>
</html>
