    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(star);
            }
        }
        function createBinaryRain() {
            const rainContainer = document.getElementById('binary-rain');
            for (let i = 0; i < 30; i++) {
                const column = document.createElement('div');
                column.className = 'binary-column';
                column.style.left = (i / 30 * 100) + '%';
                column.style.setProperty('--duration', (Math.random() * 10 + 15) + 's');
                column.style.animationDelay = Math.random() * 15 + 's';
                let binaryString = '';
                for (let j = 0; j < Math.floor(Math.random() * 30 + 20); j++) {
                    binaryString += Math.random() > 0.5 ? '1' : '0';
                }
                column.textContent = binaryString;
                rainContainer.appendChild(column);
            }
        }
        document.addEventListener('DOMContentLoaded', function() { createStars(); createBinaryRain(); });
    </script>
