<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RDPFG4P50X"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-RDPFG4P50X');
    </script>
</head>
<body>
    <div class="starfield"></div>
    <div class="stars" id="stars"></div>
    <div class="binary-rain" id="binary-rain"></div>

    <nav class="navbar">
        <a href="index.html" class="logo">&lt;/Start&gt;</a>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="index.html#articles">文章</a></li>
            <li><a href="https://github.com/maihj" target="_blank">GitHub</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <section class="hero" style="min-height: 70vh;">
            <h1 style="font-size: 8rem; margin-bottom: 30px;">404</h1>
            <p style="font-size: 1.5rem; margin-bottom: 20px;">迷失在星际空间中...</p>
            <p style="color: #666;">您访问的页面已飘向未知空间</p>
            <a href="index.html" style="display: inline-block; margin-top: 40px; padding: 15px 30px; background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%); color: #0a0a1a; text-decoration: none; border-radius: 30px; font-weight: bold; transition: all 0.3s ease;">返回首页</a>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; Maihj. All rights reserved.</p>
    </footer>

    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(star);
            }
        }
        function createBinaryRain() {
            const rainContainer = document.getElementById('binary-rain');
            for (let i = 0; i < 30; i++) {
                const column = document.createElement('div');
                column.className = 'binary-column';
                column.style.left = (i / 30 * 100) + '%';
                column.style.setProperty('--duration', (Math.random() * 10 + 15) + 's');
                column.style.animationDelay = Math.random() * 15 + 's';
                let binaryString = '';
                for (let j = 0; j < Math.floor(Math.random() * 30 + 20); j++) {
                    binaryString += Math.random() > 0.5 ? '1' : '0';
                }
                column.textContent = binaryString;
                rainContainer.appendChild(column);
            }
        }
        document.addEventListener('DOMContentLoaded', function() { createStars(); createBinaryRain(); });
    </script>
</body>
</html>
